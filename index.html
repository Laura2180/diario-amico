<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diario Amico</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4a5ab9, #8b5cf6, #a855a0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: white;
    }

    h1 { font-size: 28px; margin-top: 10px; }
    .sottotitolo { font-size: 14px; opacity: 0.8; margin-bottom: 20px; }

    .card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 25px;
      width: 100%;
      max-width: 500px;
      backdrop-filter: blur(10px);
    }

    .label { font-size: 16px; margin-bottom: 12px; font-weight: 600; }
    .label-hint { font-size: 12px; opacity: 0.6; font-weight: 400; }

    .emozioni-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .emo-btn {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 12px 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s;
    }

    .emo-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
    .emo-btn.selected { background: rgba(255,255,255,0.35); border-color: white; transform: scale(1.05); }
    .emo-btn .emoji { font-size: 28px; display: block; margin-bottom: 4px; }

    .emo-btn.auto-detected {
      background: rgba(255,220,100,0.3);
      border-color: #ffd700;
      transform: scale(1.08);
      animation: glowPulse 1.5s ease-in-out 3;
    }

    @keyframes glowPulse {
      0% { box-shadow: 0 0 5px rgba(255,215,0,0.3); }
      50% { box-shadow: 0 0 20px rgba(255,215,0,0.6); }
      100% { box-shadow: 0 0 5px rgba(255,215,0,0.3); }
    }

    .auto-detect-msg {
      text-align: center;
      font-size: 13px;
      color: #ffd700;
      margin-bottom: 15px;
      min-height: 20px;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .auto-detect-msg.visible { opacity: 1; }

    .testo-container { position: relative; margin-bottom: 15px; }

    textarea {
      width: 100%;
      min-height: 120px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 14px;
      padding-right: 60px;
      color: white;
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
    }

    textarea::placeholder { color: rgba(255,255,255,0.5); }
    textarea:focus { outline: none; border-color: rgba(255,255,255,0.5); }

    .btn-mic {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(200,150,255,0.5);
      color: white;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .btn-mic.recording { background: rgba(255,80,80,0.7); animation: pulse 1s infinite; }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,80,80,0.5); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255,80,80,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,80,80,0); }
    }

    .mic-status { text-align: center; font-size: 13px; opacity: 0.7; margin-bottom: 10px; min-height: 20px; }

    .btn-invia {
      width: 100%;
      padding: 15px;
      background: rgba(200,150,255,0.5);
      border: none;
      border-radius: 30px;
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-invia:hover { background: rgba(200,150,255,0.7); transform: scale(1.02); }
    .btn-invia:disabled { opacity: 0.5; cursor: not-allowed; }

    .risposta-box {
      display: none;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 20px;
      margin-top: 15px;
      width: 100%;
      max-width: 500px;
    }

    .risposta-header { font-size: 14px; opacity: 0.8; margin-bottom: 10px; }
    .risposta-testo { font-size: 15px; line-height: 1.6; }

    /* STORICO E RICERCA */
    .storico-box {
      display: none;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 20px;
      margin-top: 15px;
      width: 100%;
      max-width: 500px;
    }

    .storico-header {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .search-container {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .search-input {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 8px 12px;
      color: white;
      font-size: 13px;
      width: 100%;
    }

    .btn-cancella {
      background: rgba(255,100,100,0.3);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      cursor: pointer;
    }

    .storico-item {
      position: relative;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    /* TASTO ELIMINA SINGOLO */
    .btn-elimina-singolo {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-size: 14px;
      padding: 5px;
      transition: color 0.3s;
    }

    .btn-elimina-singolo:hover { color: #ff6b6b; }

    .storico-item .data-msg { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
    .storico-item .user-msg { opacity: 0.8; margin-bottom: 6px; padding-right: 20px; }
    .storico-item .amico-msg { color: #e0d0ff; }
  </style>
</head>
<body>

  <h1>💜 Diario Amico</h1>
  <p class="sottotitolo">Il tuo spazio sicuro per raccontarti</p>

  <div class="card">
    <div class="label">Come ti senti oggi? <span class="label-hint">(opzionale)</span></div>
    <div class="emozioni-grid">
      <div class="emo-btn" data-emozione="felice" onclick="selezionaEmozione(this,'felice')"><span class="emoji">😊</span> Felice</div>
      <div class="emo-btn" data-emozione="triste" onclick="selezionaEmozione(this,'triste')"><span class="emoji">😢</span> Triste</div>
      <div class="emo-btn" data-emozione="arrabbiato" onclick="selezionaEmozione(this,'arrabbiato')"><span class="emoji">😡</span> Arrabbiato</div>
      <div class="emo-btn" data-emozione="ansioso" onclick="selezionaEmozione(this,'ansioso')"><span class="emoji">😰</span> Ansioso</div>
      <div class="emo-btn" data-emozione="amato" onclick="selezionaEmozione(this,'amato')"><span class="emoji">🥰</span> Amato</div>
      <div class="emo-btn" data-emozione="così così" onclick="selezionaEmozione(this,'così così')"><span class="emoji">😐</span> Così così</div>
    </div>

    <div class="auto-detect-msg" id="autoDetectMsg"></div>
    <div class="label">Raccontami...</div>
    <div class="mic-status" id="micStatus"></div>

    <div class="testo-container">
      <textarea id="testo" placeholder="Scrivi o usa il microfono 🎤💜"></textarea>
      <button class="btn-mic" id="btnMic" onclick="toggleMicrofono()">🎤</button>
    </div>

    <button class="btn-invia" id="btnInvia" onclick="invia()">Invia al tuo diario 💌</button>
  </div>

  <div class="risposta-box" id="rispostaBox">
    <div class="risposta-header">💜 Il tuo amico dice:</div>
    <div class="risposta-testo" id="rispostaTesto"></div>
  </div>

  <div class="storico-box" id="storicoBox">
    <div class="storico-header">
      <span>📖 Le tue conversazioni</span>
      <button class="btn-cancella" onclick="cancellaStorico()">🗑️ Cancella tutto</button>
    </div>

    <div class="search-container">
        <input type="text" id="cercaTesto" class="search-input" placeholder="🔍 Cerca nelle parole..." oninput="aggiornaStorico()">
        <div style="display:flex; gap:5px;">
            <input type="date" id="cercaData" class="search-input" oninput="aggiornaStorico()">
            <button class="btn-cancella" style="background:rgba(255,255,255,0.1)" onclick="resetFiltri()">Reset</button>
        </div>
    </div>

    <div id="storicoLista"></div>
  </div>

  <script>
    var WORKER_URL = 'https://diario-amico-api.laurafra8.workers.dev';
    var STORAGE_KEY = 'diarioConversazioni';
    var emozioneSelezionata = '';
    var riconoscimento = null;
    var staRegistrando = false;
    var conversazioni = [];

    // Caricamento iniziale
    try {
      var dati = localStorage.getItem(STORAGE_KEY);
      if (dati) conversazioni = JSON.parse(dati);
    } catch(e) { console.error(e); }

    window.addEventListener('DOMContentLoaded', aggiornaStorico);

    function salva() { localStorage.setItem(STORAGE_KEY, JSON.stringify(conversazioni)); }

    function resetFiltri() {
        document.getElementById('cercaTesto').value = '';
        document.getElementById('cercaData').value = '';
        aggiornaStorico();
    }

    // ELIMINA SINGOLO MESSAGGIO
    function eliminaMessaggio(indice) {
        if(confirm("Vuoi eliminare questo messaggio? 💜")) {
            conversazioni.splice(indice, 1);
            salva();
            aggiornaStorico();
        }
    }

    function aggiornaStorico() {
      var lista = document.getElementById('storicoLista');
      var query = document.getElementById('cercaTesto').value.toLowerCase();
      var dataFiltro = document.getElementById('cercaData').value;
      
      lista.innerHTML = '';
      if (conversazioni.length > 0) {
        document.getElementById('storicoBox').style.display = 'block';
        
        // Mappiamo l'indice originale prima di invertire l'array per la visualizzazione
        var filtrate = conversazioni.map((c, index) => ({...c, originalIndex: index}))
        .filter(c => {
            var mTesto = c.testo.toLowerCase().includes(query) || c.risposta.toLowerCase().includes(query);
            var mData = dataFiltro ? c.data.split('T')[0] === dataFiltro : true;
            return mTesto && mData;
        });

        filtrate.reverse().forEach(c => {
          var item = document.createElement('div');
          item.className = 'storico-item';
          item.innerHTML = `
            <button class="btn-elimina-singolo" onclick="eliminaMessaggio(${c.originalIndex})" title="Elimina">✕</button>
            <div class="data-msg">${formattaData(c.data)}</div>
            <div class="user-msg">Tu (${c.emozione}): ${c.testo}</div>
            <div class="amico-msg">💜 ${c.risposta}</div>
          `;
          lista.appendChild(item);
        });
      } else {
        document.getElementById('storicoBox').style.display = 'none';
      }
    }

    async function invia() {
      var testo = document.getElementById('testo').value.trim();
      if (!testo) return alert('Scrivi qualcosa!');

      var btn = document.getElementById('btnInvia');
      btn.disabled = true;
      btn.textContent = 'Sto pensando... 💭';

      try {
        var r = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messaggio: testo, emozione: emozioneSelezionata })
        });
        var data = await r.json();
        var risposta = data.risposta || '💜 Sono qui per te.';

        if (risposta.includes("503") || risposta.includes("UNAVAILABLE")) {
            alert("Il server è sovraccarico, riprova tra poco! 💜");
        } else {
            conversazioni.push({
                emozione: emozioneSelezionata || 'così così',
                testo: testo,
                risposta: risposta,
                data: new Date().toISOString()
            });
            salva();
            aggiornaStorico();
            document.getElementById('rispostaTesto').textContent = risposta;
            document.getElementById('rispostaBox').style.display = 'block';
            document.getElementById('testo').value = '';
        }
      } catch(e) { alert("Errore di connessione 💜"); }
      btn.disabled = false;
      btn.textContent = 'Invia al tuo diario 💌';
    }

    function formattaData(iso) {
      var d = new Date(iso);
      var orario = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
      if (d.toDateString() === new Date().toDateString()) return '🕐 Oggi alle ' + orario;
      return '📅 ' + d.toLocaleDateString('it-IT') + ' alle ' + orario;
    }

    function selezionaEmozione(el, emo) {
        document.querySelectorAll('.emo-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        emozioneSelezionata = emo;
    }

    function cancellaStorico() {
      if (confirm('Vuoi cancellare tutto lo storico?')) {
        conversazioni = [];
        salva();
        aggiornaStorico();
      }
    }

    function toggleMicrofono() {
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return alert("Microfono non supportato");
      if (staRegistrando) { riconoscimento.stop(); staRegistrando = false; return; }
      riconoscimento = new SR();
      riconoscimento.lang = 'it-IT';
      riconoscimento.onstart = () => {
          staRegistrando = true;
          document.getElementById('btnMic').classList.add('recording');
      };
      riconoscimento.onresult = (e) => {
          document.getElementById('testo').value += e.results[0][0].transcript;
      };
      riconoscimento.onend = () => {
          staRegistrando = false;
          document.getElementById('btnMic').classList.remove('recording');
      };
      riconoscimento.start();
    }
  </script>
</body>
</html>
