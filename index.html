<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="/diario-amico/manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Diario Amico</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4a5ab9, #8b5cf6, #a855a0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: white;
    }

    h1 { font-size: 28px; margin-top: 10px; }
    .sottotitolo { font-size: 14px; opacity: 0.8; margin-bottom: 20px; }

    .card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 25px;
      width: 100%;
      max-width: 500px;
      backdrop-filter: blur(10px);
    }

    .emozioni-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .emo-btn {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 12px 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s;
    }

    .emo-btn.selected {
      background: rgba(255,255,255,0.35);
      border-color: white;
    }

    .testo-container {
      position: relative;
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 14px;
      color: white;
      font-size: 15px;
      resize: vertical;
    }

    .img-upload-container {
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-img {
      background: rgba(255,255,255,0.2);
      border: 1px dashed rgba(255,255,255,0.4);
      padding: 8px 15px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      color: white;
    }

    #previewImg {
      max-width: 100px;
      max-height: 100px;
      border-radius: 10px;
      display: none;
      border: 2px solid white;
    }

    .btn-invia {
      width: 100%;
      padding: 15px;
      background: rgba(200,150,255,0.6);
      border: none;
      border-radius: 30px;
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    .storico-box {
      display: none;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 20px;
      margin-top: 15px;
      width: 100%;
      max-width: 500px;
    }

    .search-container {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .search-input {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 8px 12px;
      color: white;
      font-size: 13px;
    }

    .btn-azione {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      cursor: pointer;
    }

    .storico-item {
      position: relative;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .msg-img {
      max-width: 100%;
      border-radius: 8px;
      margin: 8px 0;
      display: block;
    }

    .btn-elimina-singolo {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
    }

    @media print {
      body {
        background: white !important;
        color: black !important;
      }

      .card,
      .search-container,
      .btn-azione,
      .btn-elimina-singolo,
      .risposta-box,
      .btn-invia,
      .img-upload-container {
        display: none !important;
      }

      .storico-box {
        display: block !important;
        border: none !important;
        background: none !important;
        width: 100% !important;
      }

      .storico-item {
        background: none !important;
        border-bottom: 1px solid #ddd !important;
        color: black !important;
        page-break-inside: avoid;
      }

      .msg-img {
        max-width: 200px !important;
      }
    }
  </style>
</head>

<body>

  <h1>💜 Diario Amico</h1>
  <p class="sottotitolo">Il tuo spazio multimediale</p>

  <div class="card">
    <div class="emozioni-grid">
      <div class="emo-btn" onclick="selezionaEmozione(this,'felice')">😊 Felice</div>
      <div class="emo-btn" onclick="selezionaEmozione(this,'triste')">😢 Triste</div>
      <div class="emo-btn" onclick="selezionaEmozione(this,'ansioso')">😰 Ansioso</div>
    </div>

    <div class="testo-container">
      <textarea id="testo" placeholder="Raccontami la tua giornata..."></textarea>
    </div>

    <div class="img-upload-container">
      <label for="inputImg" class="btn-img">📷 Aggiungi Foto</label>
      <input type="file" id="inputImg" accept="image/*" style="display:none" onchange="previewFile()">
      <img src="" id="previewImg" alt="Anteprima">
      <button id="removeImg" style="display:none; background:none; border:none; color:white; cursor:pointer;" onclick="clearImg()">✕</button>
    </div>

    <button class="btn-invia" id="btnInvia" onclick="invia()">Invia al tuo diario 💌</button>
  </div>

  <div class="risposta-box" id="rispostaBox" style="display:none; padding:20px; background:rgba(255,255,255,0.1); border-radius:15px; margin-top:10px; width:100%; max-width:500px;">
    <div id="rispostaTesto"></div>
  </div>

  <div class="storico-box" id="storicoBox">
    <div class="storico-header" style="display:flex; justify-content:space-between; margin-bottom:15px;">
      <span>📖 Ricordi</span>
      <div>
        <button class="btn-azione" onclick="stampaDiario()">🖨️ Stampa</button>
        <button class="btn-azione" style="background:rgba(255,100,100,0.3)" onclick="cancellaStorico()">🗑️ Reset</button>
      </div>
    </div>

    <div class="search-container">
      <input type="text" id="cercaTesto" class="search-input" placeholder="🔍 Cerca parola..." oninput="aggiornaStorico()">
      <input type="date" id="cercaData" class="search-input" oninput="aggiornaStorico()">
    </div>

    <div id="storicoLista"></div>
  </div>

  <script>
    var WORKER_URL = 'https://diario-amico-api.laurafra8.workers.dev';
    var STORAGE_KEY = 'diarioConversazioni';
    var emozioneSelezionata = 'così così';
    var imgBase64 = "";
    var conversazioni = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    window.onload = aggiornaStorico;

    function previewFile() {
      var file = document.querySelector('input[type=file]').files[0];
      var reader = new FileReader();

      reader.onloadend = function () {
        imgBase64 = reader.result;
        document.getElementById('previewImg').src = imgBase64;
        document.getElementById('previewImg').style.display = 'block';
        document.getElementById('removeImg').style.display = 'inline';
      };

      if (file) {
        reader.readAsDataURL(file);
      }
    }

    function clearImg() {
      imgBase64 = "";
      document.getElementById('inputImg').value = "";
      document.getElementById('previewImg').style.display = 'none';
      document.getElementById('removeImg').style.display = 'none';
    }

    function selezionaEmozione(el, emo) {
      document.querySelectorAll('.emo-btn').forEach(function(b) {
        b.classList.remove('selected');
      });

      el.classList.add('selected');
      emozioneSelezionata = emo;
    }

    function stampaDiario() {
      window.print();
    }

    function eliminaMessaggio(index) {
      if (confirm("Eliminare questo ricordo? 💜")) {
        conversazioni.splice(index, 1);
        salvaEAggiorna();
      }
    }

    function salvaEAggiorna() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(conversazioni));
      aggiornaStorico();
    }

    async function invia() {
      var t = document.getElementById('testo').value.trim();

      if (!t && !imgBase64) {
        alert("Scrivi qualcosa o aggiungi una foto! 💜");
        return;
      }

      document.getElementById('btnInvia').textContent = "💭 Salvataggio...";

      try {
        var r = await fetch(WORKER_URL, {
          method: 'POST',
          body: JSON.stringify({
            messaggio: t,
            emozione: emozioneSelezionata
          })
        });

        var d = await r.json();
        var risp = d.risposta || "💜 Sono qui.";

        if (!risp.includes("503")) {
          conversazioni.push({
            testo: t,
            risposta: risp,
            emozione: emozioneSelezionata,
            data: new Date().toISOString(),
            immagine: imgBase64
          });

          salvaEAggiorna();

          document.getElementById('rispostaTesto').textContent = risp;
          document.getElementById('rispostaBox').style.display = 'block';
          document.getElementById('testo').value = '';

          clearImg();
        } else {
          alert("Server occupato, ma il tuo pensiero è salvo. Riprova tra poco! 💜");
        }

      } catch (e) {
        alert("Errore di connessione 💜");
      }

      document.getElementById('btnInvia').textContent = "Invia al tuo diario 💌";
    }

    function aggiornaStorico() {
      var lista = document.getElementById('storicoLista');
      var q = document.getElementById('cercaTesto').value.toLowerCase();
      var dF = document.getElementById('cercaData').value;

      lista.innerHTML = '';

      if (conversazioni.length > 0) {
        document.getElementById('storicoBox').style.display = 'block';

        conversazioni
          .map(function(c, i) {
            c.id = i;
            return c;
          })
          .filter(function(c) {
            var mText = c.testo.toLowerCase().includes(q) || c.risposta.toLowerCase().includes(q);
            var mDate = dF ? c.data.startsWith(dF) : true;
            return mText && mDate;
          })
          .reverse()
          .forEach(function(c) {
            var div = document.createElement('div');
            div.className = 'storico-item';

            var dt = new Date(c.data).toLocaleString('it-IT', {
              day: '2-digit',
              month: '2-digit',
              hour: '2-digit',
              minute: '2-digit'
            });

            var imgHtml = c.immagine ? '<img src="' + c.immagine + '" class="msg-img">' : '';

            div.innerHTML =
              '<button class="btn-elimina-singolo" onclick="eliminaMessaggio(' + c.id + ')">✕</button>' +
              '<div style="font-size:10px; opacity:0.5">' + dt + '</div>' +
              imgHtml +
              '<div><b>Tu:</b> ' + c.testo + '</div>' +
              '<div><b>Amico:</b> ' + c.risposta + '</div>';

            lista.appendChild(div);
          });
      }
    }

    function cancellaStorico() {
      if (confirm("Vuoi svuotare tutto il diario?")) {
        conversazioni = [];
        salvaEAggiorna();
      }
    }
  </script>

</body>
</html>
